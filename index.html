<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pipo's</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>PM Pipo's</h1>
  <button id="carrinho-toggle" aria-label="Abrir carrinho">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
      <path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96C5 16.1 6.9 18 9 18h12v-2H9.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63H19c.75 0 1.41-.41 1.75-1.03l3.58-6.49A1 1 0 0023.54 5H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/>
    </svg>
    <span id="carrinho-count">0</span>
  </button>
</header>

<div id="carrinho-overlay"></div>
<div id="carrinho-painel">
  <div id="carrinho-header">
    <h2>Seu Carrinho</h2>
    <button id="carrinho-fechar">&times;</button>
  </div>
  <div id="carrinho-itens">
    <p id="carrinho-vazio">Seu carrinho está vazio.</p>
  </div>
  <div id="carrinho-footer">
    <div id="carrinho-total-linha">
      <span>Total:</span>
      <span id="carrinho-total">R$ 0,00</span>
    </div>
    <button id="carrinho-finalizar">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" style="width:20px;height:20px">
        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
      </svg>
      Finalizar pelo WhatsApp
    </button>
  </div>
</div>

<section class="filters">

  <select id="marcaFilter" aria-label="Filtrar por marca">
    <option value="">Marca</option>
    <option value="Nike">Nike</option>
    <option value="Adidas">Adidas</option>
    <option value="Puma">Puma</option>
    <option value="DC">DC</option>
    <option value="Kenner">Kenner</option>
  </select>

  <select id="tamanhoFilter" aria-label="Filtrar por tamanho">
    <option value="">Tamanho</option>
    <option value="30">30</option>
    <option value="35">35</option>
    <option value="36">36</option>
    <option value="37">37</option>
    <option value="38">38</option>
    <option value="39">39</option>
    <option value="40">40</option>
    <option value="41">41</option>
    <option value="42">42</option>
    <option value="43">43</option>
  </select>

  <!-- select de gênero hidden, sincronizado com as tabs -->
  <select id="generoFilter" aria-label="Filtrar por gênero" style="display:none;">
    <option value="">Gênero</option>
    <option value="masculino">Masculino</option>
    <option value="feminino">Feminino</option>
    <option value="unisex">Unisex</option>
    <option value="infantil">Infantil</option>
  </select>

  <button id="aplicarFiltros">Filtrar</button>
  <button id="limparFiltros">Limpar</button>
</section>

<main id="catalogo" style="display: flex; flex-wrap: wrap; justify-content: center;"></main>

<div id="modal">
  <div class="modal-conteudo">
    <button id="fecharModal">&times;</button>

    <div class="carrossel">
      <button class="seta-btn" id="btnAnterior">&#8592;</button>
      <img id="modal-img" src="" alt="">
      <button class="seta-btn" id="btnProxima">&#8594;</button>
    </div>

    <div class="modal-info">
      <h2 id="modal-nome"></h2>
      <p id="modal-marca"></p>
      <p id="modal-genero"></p>
      <p id="modal-descricao"></p>
      <p id="modal-preco" class="modal-preco"></p>
      <div class="tamanhos-label">Escolha o tamanho:</div>
      <div id="modal-tamanhos"></div>
      <div class="tamanhos-label">Para quem é?</div>
      <div id="modal-para-quem"></div>
    </div>
  </div>
</div>

<div style="text-align: center; margin: 2rem 0;">
  <a href="https://wa.me/5524992938796" target="_blank" class="btn-whatsapp">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
      <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
    </svg>
    Falar no WhatsApp
  </a>
</div>

</body>
</html>
